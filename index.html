<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Expense Tracker Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --card-light: #334155;
            --accent: #38bdf8;
            --accent-alt: #06b6d4;
            --text-dark: #e2e8f0;
            --text-light: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body.light-theme {
            --bg-dark: #f8fafc;
            --card-dark: #ffffff;
            --card-light: #e2e8f0;
            --text-dark: #1e293b;
            --text-light: #475569;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--card-dark);
            padding: 30px 20px;
            border-right: 2px solid var(--card-light);
            max-height: 100vh;
            overflow-y: auto;
            position: sticky;
            top: 0;
        }
        .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .sidebar-header h2 { color: var(--accent); font-size: 24px; margin: 0; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-menu button {
            background: none; border: none; color: var(--text-light);
            padding: 12px 15px; text-align: left; cursor: pointer;
            border-radius: 8px; transition: all 0.3s ease; font-size: 14px;
        }
        .sidebar-menu button:hover { background: var(--card-light); color: var(--accent); }
        .sidebar-menu button.active { background: var(--accent); color: var(--bg-dark); font-weight: bold; }
        .theme-toggle { margin-top: 30px; padding-top: 20px; border-top: 2px solid var(--card-light); }
        .theme-toggle button {
            width: 100%; padding: 10px; background: var(--accent); color: var(--bg-dark);
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--card-dark); padding: 25px; border-radius: 12px;
            border-left: 4px solid var(--accent); transition: all 0.3s ease;
        }
        .stat-label { color: var(--text-light); font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--accent); }
        .form-section {
            background: var(--card-dark); padding: 30px; border-radius: 12px;
            margin-bottom: 40px; border: 1px solid var(--card-light);
        }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select, textarea {
            padding: 12px 15px; background: var(--card-light); border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--text-dark); border-radius: 8px; font-size: 14px; width: 100%;
        }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: var(--accent); color: var(--bg-dark); }
        .btn-secondary { background: var(--card-light); color: var(--text-dark); border: 1px solid var(--accent); }
        .transactions-list { background: var(--card-dark); border-radius: 12px; overflow: hidden; }
        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid var(--card-light);
        }
        .transaction-amount.income { color: var(--success); }
        .transaction-amount.expense { color: var(--danger); }
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 40px; }
        .chart-card { background: var(--card-dark); padding: 25px; border-radius: 12px; border: 1px solid var(--card-light); }
        .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .alert.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border-left: 4px solid var(--success); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; position: static; border-right: none; border-bottom: 2px solid var(--card-light); } .main { padding: 20px; } }
    </style>
</head>
<body>
<div class="container-fluid"><div class="row g-0">
<div class="col-lg-3 col-md-4 sidebar">
<div class="sidebar-header">
<i class="fas fa-wallet" style="color: var(--accent);"></i>
<h2>ExpenseMax</h2>
</div>
<div class="sidebar-menu">
<button class="nav-btn active" onclick="switchTab('dashboard', this)"><i class="fas fa-chart-line"></i> Dashboard</button>
<button class="nav-btn" onclick="switchTab('transactions', this)"><i class="fas fa-exchange-alt"></i> Transactions</button>
<button class="nav-btn" onclick="switchTab('analytics', this)"><i class="fas fa-chart-pie"></i> Analytics</button>
<button class="nav-btn" onclick="switchTab('settings', this)"><i class="fas fa-cog"></i> Settings</button>
</div>
<div class="theme-toggle">
<button onclick="toggleTheme()"><i class="fas fa-moon"></i> Dark/Light</button>
</div>
</div>
<div class="col-lg-9 col-md-8 main">
<div class="tab-content active" id="dashboard">
<div class="header"><h1>Dashboard</h1></div>
<div id="alertContainer"></div>
<div class="stats-grid">
<div class="card stat-card"><div class="stat-label">Total Balance</div><div class="stat-value" id="totalBalance">₹0</div></div>
<div class="card stat-card"><div class="stat-label">Total Income</div><div class="stat-value" id="totalIncome" style="color: var(--success);">₹0</div></div>
<div class="card stat-card"><div class="stat-label">Total Expense</div><div class="stat-value" id="totalExpense" style="color: var(--danger);">₹0</div></div>
</div>
<div class="form-section">
<h3><i class="fas fa-plus-circle"></i> Add Transaction</h3>
<div class="form-grid">
<input class="form-control" id="desc" placeholder="Description" type="text"/>
<input class="form-control" id="amount" placeholder="Amount" type="number"/>
<input class="form-control" id="date" type="date"/>
<select class="form-select" id="type"><option value="expense">Expense</option><option value="income">Income</option></select>
<select class="form-select" id="category"><option>Food</option><option>Travel</option><option>Bills</option><option>Shopping</option><option>Health</option><option>Other</option></select>
</div>
<div class="button-group">
<button class="btn btn-primary" onclick="addTransaction()">Add Transaction</button>
<button class="btn btn-secondary" onclick="clearForm()">Clear</button>
</div>
</div>
<div class="charts-container">
<div class="chart-card"><h4>Income vs Expense</h4><canvas id="incomeVsExpenseChart"></canvas></div>
<div class="chart-card"><h4>By Category</h4><canvas id="categoryChart"></canvas></div>
</div>
<div class="form-section"><h3>Recent Activity</h3><div class="transactions-list" id="recentTransactions"></div></div>
</div>
<div class="tab-content" id="transactions">
<div class="header"><h1>All Transactions</h1></div>
<div class="transactions-list" id="fullTransactionsList"></div>
</div>
<div class="tab-content" id="analytics">
<div class="header"><h1>Analytics</h1></div>
<div class="chart-card" style="margin-bottom: 20px;">
<h4>Monthly Trend</h4>
<canvas id="trendChart"></canvas>
</div>
</div>
<div class="tab-content" id="settings">
<div class="header"><h1>Settings</h1></div>
<div class="form-section">
<h3>Preferences</h3>
<button class="btn btn-danger" onclick="clearAllData()">Clear All Data</button>
</div>
</div>
</div>
</div></div>
<script>
        const CURRENCY = '₹';
        let allTransactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let charts = {};

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            renderDashboard();
            renderCharts();
        });

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'transactions') renderFullList();
            if(tabId === 'analytics') renderTrendChart();
        }

        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;

            if (!desc || isNaN(amount) || !date) {
                alert('Please fill in all fields');
                return;
            }

            const transaction = {
                id: Date.now(), desc, 
                amount: type === 'expense' ? -Math.abs(amount) : Math.abs(amount),
                date, category, type
            };

            allTransactions.push(transaction);
            localStorage.setItem('transactions', JSON.stringify(allTransactions));
            renderDashboard();
            renderCharts();
            clearForm();
            showAlert('Transaction saved!');
        }

        function clearForm() {
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
        }

        function renderDashboard() {
            let income = 0, expense = 0;
            allTransactions.forEach(t => {
                if (t.type === 'income') income += t.amount;
                else expense += t.amount;
            });
            document.getElementById('totalBalance').textContent = CURRENCY + (income + expense).toFixed(2);
            document.getElementById('totalIncome').textContent = CURRENCY + income.toFixed(2);
            document.getElementById('totalExpense').textContent = CURRENCY + Math.abs(expense).toFixed(2);
            
            const recent = allTransactions.slice(-5).reverse();
            document.getElementById('recentTransactions').innerHTML = recent.length ? recent.map(t => `
                <div class="transaction-item">
                    <div><strong>${t.desc}</strong><br><small>${t.category} • ${t.date}</small></div>
                    <div class="transaction-amount ${t.type}">${CURRENCY}${Math.abs(t.amount).toFixed(2)}</div>
                </div>
            `).join('') : '<div style="padding: 20px; text-align: center;">No transactions yet</div>';
        }

        function renderFullList() {
            const list = allTransactions.slice().reverse();
            document.getElementById('fullTransactionsList').innerHTML = list.map(t => `
                <div class="transaction-item">
                    <div><strong>${t.desc}</strong><br><small>${t.category} • ${t.date}</small></div>
                    <div class="transaction-amount ${t.type}">${CURRENCY}${Math.abs(t.amount).toFixed(2)}</div>
                </div>
            `).join('');
        }

        function renderCharts() {
            const stats = { income: 0, expense: 0 };
            const cats = {};
            allTransactions.forEach(t => {
                if (t.type === 'income') stats.income += t.amount;
                else {
                    stats.expense += Math.abs(t.amount);
                    cats[t.category] = (cats[t.category] || 0) + Math.abs(t.amount);
                }
            });

            if (charts.pie) charts.pie.destroy();
            charts.pie = new Chart(document.getElementById('incomeVsExpenseChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Income', 'Expense'],
                    datasets: [{ data: [stats.income, stats.expense], backgroundColor: ['#10b981', '#ef4444'], borderColor: '#1e293b' }]
                },
                options: { plugins: { legend: { labels: { color: '#e2e8f0' } } } }
            });

            if (charts.bar) charts.bar.destroy();
            charts.bar = new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ label: 'Spending', data: Object.values(cats), backgroundColor: '#38bdf8' }]
                },
                options: { 
                    scales: { y: { ticks: { color: '#cbd5e1' } }, x: { ticks: { color: '#cbd5e1' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderTrendChart() {
            const trend = {};
            allTransactions.forEach(t => {
                const m = t.date.substring(0, 7);
                trend[m] = (trend[m] || 0) + Math.abs(t.amount);
            });
            if (charts.trend) charts.trend.destroy();
            charts.trend = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(trend),
                    datasets: [{ label: 'Total Spending', data: Object.values(trend), borderColor: '#38bdf8', tension: 0.3 }]
                }
            });
        }

        function toggleTheme() { document.body.classList.toggle('light-theme'); }

        function clearAllData() {
            if(confirm('Delete everything?')) { localStorage.clear(); location.reload(); }
        }

        function showAlert(msg) {
            const div = document.createElement('div');
            div.className = 'alert success';
            div.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            document.getElementById('alertContainer').appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
